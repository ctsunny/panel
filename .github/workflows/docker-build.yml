name: Build and Push Images Based on Version

# 在这里定义统一版本号
env:
  VERSION: "1.5.4"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使 tag 已存在）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-version:
    name: Check Version and Decide Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
      should_build: ${{ steps.check-tag.outputs.should_build }}
      should_build_gost: ${{ steps.check-tag.outputs.should_build_gost }}
      tag_exists: ${{ steps.check-tag.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Display version
        run: |
          echo "Current version: ${{ env.VERSION }}"

      - name: Check if tag exists and detect changes
        id: check-tag
        run: |
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "🔨 强制重新构建，跳过 tag 检查"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
          elif git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "should_build=false" >> $GITHUB_OUTPUT

            # 检查从tag到现在，go-gost目录下的文件是否有变化
            TAG_COMMIT=$(git rev-list -n 1 "${{ env.VERSION }}")
            echo "Tag commit: $TAG_COMMIT"
            echo "Current HEAD: $(git rev-parse HEAD)"

            if git diff --quiet --ignore-all-space --ignore-blank-lines $TAG_COMMIT HEAD -- go-gost/ 2>/dev/null; then
              echo "✅ GOST files unchanged since tag"
              echo "should_build_gost=false" >> $GITHUB_OUTPUT
            else
              echo "🔄 Detected changes in go-gost directory"
              git diff --stat $TAG_COMMIT HEAD -- go-gost/ || true
              echo "should_build_gost=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag ${{ env.VERSION }} does not exist, will build all components"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

  build-gost:
    name: Build & Compress GOST Binary
    needs: check-version
    if: needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: go-gost/go.sum

      - name: Build GOST binary (AMD64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gost-amd64

      - name: Build GOST binary (ARM64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o gost-arm64

      - name: Upload GOST AMD64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: gost-binary-amd64
          path: ./go-gost/gost-amd64

      - name: Upload GOST ARM64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: gost-binary-arm64
          path: ./go-gost/gost-arm64

  build-panel:
    name: Build & Push Panel (Go backend + Frontend)
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Panel Docker image
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t ghcr.io/ctsunny/panel:latest \
            -t ghcr.io/ctsunny/panel:${VERSION} \
            -f Dockerfile \
            .

      - name: Export frontend dist from build cache
        # 复用上一步 GHA 缓存中的 frontend-dist stage，仅导出 dist 目录（跳过 node_modules ~250 MB）
        # frontend 产物与 CPU 架构无关，无需指定 --platform
        run: |
          docker buildx build \
            --target frontend-dist \
            --output type=local,dest=./frontend-export \
            --cache-from type=gha \
            -f Dockerfile \
            .
          cd frontend-export/dist && tar -czf ../../frontend-dist.tar.gz . && cd ../..

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: ./frontend-dist.tar.gz

  build-panel-binary:
    name: Build Panel Binary (Bare-metal)
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: go-backend/go.sum

      - name: Build Panel binary (AMD64)
        working-directory: ./go-backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o panel-amd64 .

      - name: Build Panel binary (ARM64)
        working-directory: ./go-backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o panel-arm64 .

      - name: Upload Panel AMD64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: panel-binary-amd64
          path: ./go-backend/panel-amd64

      - name: Upload Panel ARM64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: panel-binary-arm64
          path: ./go-backend/panel-arm64

  create-release:
    name: Create Release and Tag
    needs: [check-version, build-gost, build-panel, build-panel-binary]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v8
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v8
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Download Panel AMD64 binary
        uses: actions/download-artifact@v8
        with:
          name: panel-binary-amd64
          path: ./artifacts/panel-bins/amd64

      - name: Download Panel ARM64 binary
        uses: actions/download-artifact@v8
        with:
          name: panel-binary-arm64
          path: ./artifacts/panel-bins/arm64

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: ./artifacts

      - name: Rename binaries
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64
          mv ./artifacts/panel-bins/amd64/panel-amd64 ./artifacts/panel-amd64
          mv ./artifacts/panel-bins/arm64/panel-arm64 ./artifacts/panel-arm64

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          # 创建并推送 tag（如已存在则先删除再创建）
          git tag -d "${VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/${VERSION}" 2>/dev/null || true
          git tag "${VERSION}" ${{ github.sha }}
          git push origin "${VERSION}"

          # 获取 commit 信息
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")

          # 删除已有的同名 release（如有），再创建新的
          gh release delete "${VERSION}" --yes 2>/dev/null || true

          # 创建 release
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "## 📝 Commit Information
          - **Message**: ${COMMIT_MSG}
          - **Author**: ${COMMIT_AUTHOR}
          - **Date**: ${COMMIT_DATE}
          - **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          ## 🚀 What's New in v1.5.3
          - **Bug fixes**: Fixed merge bug in PanelGateMiddleware indentation
          - **Install scripts**: Added panel_install.sh for bare-metal installation
          - **Frontend**: Updated frontend build and static file serving" \
            --repo ${{ github.repository }}

          # 上传所有文件到 release
          echo "📤 上传 GOST 二进制文件..."
          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber

          echo "📤 上传 Panel 裸机二进制文件..."
          gh release upload "${VERSION}" ./artifacts/panel-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/panel-arm64 --clobber

          echo "📤 上传前端静态资源..."
          gh release upload "${VERSION}" ./artifacts/frontend-dist.tar.gz --clobber

          echo "📤 上传安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber

          echo "📤 上传 systemd service 文件..."
          gh release upload "${VERSION}" ./panel.service --clobber

          echo "✅ 所有文件已上传到 Release ${VERSION}"

  update-release-gost:
    name: Update GOST Binaries in Release
    needs: [check-version, build-gost]
    if: needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v8
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v8
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Rename binaries
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

      - name: Update GOST binaries in Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          echo "🔄 更新 Release ${VERSION} 中的 GOST 二进制文件..."

          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber

          echo "✅ GOST 二进制文件更新完成！"
          echo "ℹ️ Docker 镜像未重新构建"

  update-release-files:
    name: Update Release Files Only
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true' && needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update Release Files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          echo "📤 更新 Release ${VERSION} 中的脚本和配置文件..."

          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          gh release upload "${VERSION}" ./panel.service --clobber

          echo "✅ 文件更新完成！"
          echo "ℹ️ Docker 镜像和 GOST 二进制未重新构建"
