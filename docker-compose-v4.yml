services:
  panel:
    image: ghcr.io/ctsunny/panel:${VERSION:-latest}
    container_name: panel
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PORT: "6365"
      DB_PATH: /data/gost.db
      STATIC_DIR: /app/static
      LOG_DIR: /data/logs
    ports:
      - "${PANEL_PORT:-6365}:6365"
    volumes:
      - panel_data:/data

volumes:
  panel_data:
    name: panel_data
    driver: local
