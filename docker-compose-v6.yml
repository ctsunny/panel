services:
  panel:
    image: ghcr.io/ctsunny/panel:${VERSION:-latest}
    container_name: panel
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PORT: "6365"
      DB_PATH: /data/gost.db
      STATIC_DIR: /app/static
      LOG_DIR: /data/logs
    ports:
      - "${PANEL_PORT:-6365}:6365"
    volumes:
      - panel_data:/data
    networks:
      - panel-network

volumes:
  panel_data:
    name: panel_data
    driver: local

networks:
  panel-network:
    name: panel-network
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: fd00:dead:beef::/48
